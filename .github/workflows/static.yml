# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

# Memberikan izin ke token GitHub Actions untuk melakukan deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mengelola deployment agar tidak terjadi tabrakan jika ada push berturut-turut
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ================= TAHAP CI (CONTINUOUS INTEGRATION) =================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Menampilkan Daftar File
        run: ls -R

      - name: Validasi HTML
        run: |
          if [ -f index.html ]; then
            echo "index.html ditemukan"
          else
            echo "index.html tidak ditemukan"
            exit 1
          fi

      - name: Validasi CSS
        run: |
          if [ -f style.css ]; then
            echo "style.css ditemukan"
          else
            echo "style.css tidak ditemukan"
            exit 1
          fi

      - name: Validasi JavaScript
        run: |
          if [ -f script.js ]; then
            echo "script.js ditemukan"
          else
            echo "script.js tidak ditemukan"
            exit 1
          fi

      - name: Build Berhasil
        run: echo "CI Pipeline berhasil dijalankan."

      # Menyiapkan file website untuk diunggah sebagai artifact (persiapan CD)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Mengunggah seluruh isi folder project saat ini

  # ================= TAHAP CD (CONTINUOUS DEPLOYMENT) =================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-test # Tahap ini HANYA berjalan jika tahap CI di atas sukses tanpa error
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4