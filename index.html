<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resep Masakan Nusantara</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🍽️ Resep Masakan Nusantara</h1>
        <p>Jelajahi berbagai resep makanan khas Indonesia</p>
    </header>

    <main class="container">

        <div class="card">
            <img src="images/rendang.jpg" alt="Rendang">

            <h2>Rendang</h2>

            <p><strong>Asal :</strong> Sumatera Barat</p>

            <button onclick="showRecipe('rendang')">
                Lihat Resep
            </button>
        </div>

        <div class="card">
            <img src="images/pempek.jpg" alt="Pempek">

            <h2>Pempek</h2>

            <p><strong>Asal :</strong> Sumatera Selatan</p>

            <button onclick="showRecipe('pempek')">
                Lihat Resep
            </button>
        </div>

        <div class="card">
            <img src="images/sate.jpg" alt="Sate">

            <h2>Sate Madura</h2>

            <p><strong>Asal :</strong> Jawa Timur</p>

            <button onclick="showRecipe('sate')">
                Lihat Resep
            </button>
        </div>

        <div class="card">
            <img src="images/mieaceh.jpg" alt="Mie Aceh">

            <h2>Mie Aceh</h2>

            <p><strong>Asal :</strong> Aceh</p>

            <button onclick="showRecipe('mieaceh')">
                Lihat Resep
            </button>
        </div>

    </main>


    <div id="recipeModal" class="modal">

        <div class="modal-content">

           <button class="close" onclick="closeRecipe()" aria-label="Tutup resep">&times;</button>

            <pre id="recipeText"></pre>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
